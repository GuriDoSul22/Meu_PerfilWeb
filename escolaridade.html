<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escolaridade</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div>
    <h1>Dados do Aluno</h1>
    <div class="card" id="escolaridade">
        <button class="back-button"
        onclick="window.location.href='index.html'">Voltar</button>
    </div>
    <script>
        fetch('http://localhost:3000/escolaridade')
            .then(response => response.json())
            .then(data => {
                const perfilDiv = document.getElementById('escolaridade');
                perfilDiv.innerHTML = `
                    <h2>escolaridade</h2>
                    <p><strong>Escola:</strong> ${data.escola}</p>    
                    <p><strong>Curso:</strong> ${data.curso}</p>
                    <p><strong>Conclusao:</strong> ${data.conclusao}</p>
<button class="back-button"
        onclick="window.location.href='index.html'">Voltar</button>
                `;
            })
            .catch(error => console.error('Erro ao carregar o perfil:', error));
    </script>
    </script>
</div>
</body>
</html>
