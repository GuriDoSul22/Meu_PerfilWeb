<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Endereço</title>
    <link rel="stylesheet" href="index.css">
</head>
<body>
    <div>
    <h1>Dados do Aluno</h1>
    <div class="card" id="endereco">
        <button class="back-button"
        onclick="window.location.href='index.html'">Voltar</button>
    </div>
    <script>
        fetch('http://localhost:3000/endereco')
            .then(response => response.json())
            .then(data => {
                const perfilDiv = document.getElementById('endereco');
                perfilDiv.innerHTML = `
                    <h2>Endereço</h2>
                    <p><strong>Rua:</strong> ${data.rua}</p>    
                    <p><strong>Bairro:</strong> ${data.bairro}</p>
                    <p><strong>Cep:</strong> ${data.cep}</p>
<button class="back-button"
        onclick="window.location.href='index.html'">Voltar</button>
                `;
            })
            .catch(error => console.error('Erro ao carregar o perfil:', error));
    </script>
    </script>
</div>
</body>
</html>
